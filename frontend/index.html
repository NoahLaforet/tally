<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Tally</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<style>
  :root{
    --bg:#04060e;
    --glass:rgba(10,13,24,.60); --glass-2:rgba(15,19,34,.68); --glass-hi:rgba(220,232,255,.08);
    --glass-edge:rgba(170,200,255,.09); --glass-shadow:0 18px 50px -16px rgba(0,0,0,.78);
    --text:#eaf0fb; --text-dim:#a8b2cc; --text-faint:#8791ab;
    --accent:#4d7cff; --accent-2:#7b5cff; --accent-soft:rgba(77,124,255,.20); --glow:rgba(77,124,255,.42);
    --good:#3ad29f; --warn:#ffc24d; --bad:#ff6f86;
    --chart-track:rgba(255,255,255,.07);
    --b1:#1e3a8a; --b2:#5b21b6;
    --blob-op:.55;
    --r:13px; --r-sm:10px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,"Helvetica Neue",sans-serif;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  [data-theme="light"]{
    --bg:#e9edfb;
    --glass:rgba(255,255,255,.62); --glass-2:rgba(255,255,255,.78); --glass-hi:rgba(255,255,255,.95);
    --glass-edge:rgba(20,30,80,.10); --glass-shadow:0 18px 48px -18px rgba(30,40,100,.26);
    --text:#10172e; --text-dim:#485372; --text-faint:#5b6480;
    --accent:#3a5cf0; --accent-2:#6d4eff; --accent-soft:rgba(58,92,240,.12); --glow:rgba(58,92,240,.24);
    --good:#0a7a57; --warn:#8f5a05; --bad:#c73652;
    --chart-track:rgba(16,22,55,.08);
    --b1:#93c5fd; --b2:#c4b5fd;
    --blob-op:.5;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);
    -webkit-font-smoothing:antialiased;line-height:1.5;letter-spacing:-0.008em;
    padding:30px 20px 80px;min-height:100vh}
  [hidden]{display:none !important}
  .mono,.val,.amt,.big,th,td.num{font-variant-numeric:tabular-nums}
  .wrap{max-width:1140px;margin:0 auto;position:relative;z-index:1}
  a{color:var(--accent);text-decoration:none;font-weight:500}
  a:hover{text-decoration:underline;text-underline-offset:3px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

  /* liquid glass background: two washes, motion only when allowed */
  .liquid-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .liquid-bg b{position:absolute;border-radius:50%;filter:blur(70px);opacity:var(--blob-op)}
  .liquid-bg b:nth-child(1){width:54vw;height:54vw;background:var(--b1);top:-16%;left:-10%}
  .liquid-bg b:nth-child(2){width:46vw;height:46vw;background:var(--b2);bottom:-18%;right:-8%}
  @media (prefers-reduced-motion: no-preference){
    .liquid-bg b:nth-child(1){animation:drift1 34s var(--ease) infinite alternate}
    .liquid-bg b:nth-child(2){animation:drift2 40s var(--ease) infinite alternate}
    @keyframes drift1{to{transform:translate(12vw,10vh) scale(1.12)}}
    @keyframes drift2{to{transform:translate(-10vw,-8vh) scale(1.08)}}
    .view.active{animation:fade .22s var(--ease)}
    @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .skel{animation:shimmer 1.3s linear infinite}
    @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
  }

  /* shared glass surface */
  .stat,.panel,.callout,.tabs{
    background:var(--glass);
    -webkit-backdrop-filter:blur(16px) saturate(160%);backdrop-filter:blur(16px) saturate(160%);
    border:1px solid var(--glass-edge);border-radius:var(--r);
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-hi);
  }

  /* header */
  .head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:26px;flex-wrap:wrap}
  .brand h1{font-size:27px;font-weight:800;letter-spacing:-0.055em;margin:0}
  .brand h1 .acc{color:var(--accent);text-shadow:0 0 16px var(--glow)}
  .brand .sub{font-size:12.5px;color:var(--text-faint);margin-top:4px;font-weight:450}
  .head .actions{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .hint{font-size:12px;color:var(--text-faint)}

  /* buttons */
  .btn{font-family:var(--font);font-size:13px;font-weight:550;color:var(--text-dim);background:var(--glass);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:1px solid var(--glass-edge);border-radius:11px;
    padding:9px 14px;min-height:38px;cursor:pointer;box-shadow:inset 0 1px 0 var(--glass-hi);transition:color .18s var(--ease),border-color .18s var(--ease),box-shadow .18s var(--ease)}
  .btn:hover{color:var(--text);border-color:var(--accent-soft)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;
    box-shadow:0 4px 16px -4px var(--glow),inset 0 1px 0 rgba(255,255,255,.35)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.danger:hover{color:var(--bad);border-color:var(--bad)}
  .iconbtn2{width:38px;height:38px;min-height:38px;display:grid;place-items:center;padding:0;
    background:var(--glass);border:1px solid var(--glass-edge);border-radius:11px;cursor:pointer;color:var(--accent);
    box-shadow:inset 0 1px 0 var(--glass-hi);transition:box-shadow .18s var(--ease)}
  .iconbtn2:hover{box-shadow:inset 0 1px 0 var(--glass-hi),0 0 16px var(--glow)}
  .iconbtn2 svg{width:17px;height:17px}
  .minibtn{font-family:var(--font);font-size:12.5px;font-weight:500;background:var(--glass-2);border:1px solid var(--glass-edge);
    border-radius:9px;color:var(--text-dim);padding:6px 11px;min-height:32px;cursor:pointer;line-height:1;transition:all .15s var(--ease)}
  .minibtn:hover{color:var(--text);border-color:var(--accent-soft)}
  .minibtn.del:hover{color:var(--bad);border-color:var(--bad)}
  .minibtn.acc{color:var(--accent);border-color:var(--accent-soft)}

  /* hero */
  .hero{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:14px;margin-bottom:24px}
  .stat{padding:18px 20px;position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;top:0;left:0;right:0;height:34%;background:linear-gradient(180deg,var(--glass-hi),transparent);opacity:.5;pointer-events:none}
  .stat .lbl{font-size:12px;color:var(--text-faint);margin-bottom:11px;font-weight:500;position:relative}
  .stat .val{font-weight:750;font-size:28px;letter-spacing:-0.045em;line-height:1;position:relative}
  .stat:first-child .val{font-size:38px}
  .stat .val .c{font-size:15px;color:var(--text-dim);font-weight:500}
  .stat .foot{font-size:11.5px;color:var(--text-faint);margin-top:10px;font-weight:450;position:relative}
  .stat.out .val{color:var(--bad)} .stat.in .val{color:var(--good)} .stat.net .val{color:var(--accent)} .stat.rw .val{color:var(--warn)}

  /* tabs */
  .tabs{display:inline-flex;gap:3px;margin-bottom:24px;border-radius:14px;padding:5px;flex-wrap:wrap}
  .tab{font-family:var(--font);font-size:13px;font-weight:550;color:var(--text-dim);background:transparent;border:none;
    padding:9px 15px;min-height:38px;cursor:pointer;border-radius:9px;transition:color .18s var(--ease),background .18s var(--ease)}
  .tab:hover{color:var(--text)}
  .tab[aria-selected="true"]{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 4px 16px -4px var(--glow),inset 0 1px 0 rgba(255,255,255,.35)}
  .view{display:none} .view.active{display:block}

  /* panels */
  .panel{padding:21px 23px;margin-bottom:15px;position:relative;overflow:hidden}
  .panel h2{font-size:16px;margin:0 0 4px;font-weight:700;letter-spacing:-0.02em}
  .panel .desc{font-size:13px;color:var(--text-dim);margin:0 0 18px;max-width:72ch;font-weight:450}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  h3.mini{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);margin:0 0 12px;font-weight:600}

  /* callouts */
  .callout{display:flex;gap:16px;align-items:flex-start;padding:17px 19px;margin-bottom:14px;position:relative;overflow:hidden}
  .callout.good{background:color-mix(in srgb,var(--good) 10%,var(--glass))}
  .callout.bad{background:color-mix(in srgb,var(--bad) 10%,var(--glass))}
  .callout.info{background:color-mix(in srgb,var(--accent) 10%,var(--glass))}
  .callout .big{font-size:25px;font-weight:750;white-space:nowrap;letter-spacing:-0.04em}
  .callout.good .big{color:var(--good)} .callout.bad .big{color:var(--bad)} .callout.info .big{color:var(--accent)}
  .callout .txt{font-size:13px;color:var(--text-dim);line-height:1.55;font-weight:450}
  .callout .txt b{color:var(--text);font-weight:600}

  /* bars */
  .bars{display:flex;flex-direction:column;gap:12px}
  .bar-row{display:grid;grid-template-columns:150px 1fr 90px;gap:13px;align-items:center}
  .bar-row .nm{font-size:13.5px;font-weight:450;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-dim)}
  .bar-track{height:9px;background:var(--chart-track);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;box-shadow:0 0 10px -2px currentColor}
  .bar-row .amt{font-size:13px;font-weight:550;text-align:right;white-space:nowrap}
  .bar-row .amt .per{font-size:10px;color:var(--text-faint);font-weight:450}

  /* budget rows */
  .brow{display:grid;grid-template-columns:170px 1fr 168px;gap:16px;align-items:center;padding:13px 0;border-bottom:1px solid var(--glass-edge)}
  .brow:last-child{border-bottom:none}
  .brow .nm{font-size:14px;font-weight:550}
  .brow .nm .subnm{font-size:11px;color:var(--text-faint);display:block;margin-top:2px;font-weight:450}
  .tgt-track{height:10px;background:var(--chart-track);border-radius:4px;position:relative;overflow:visible}
  .tgt-fill{height:100%;border-radius:4px}
  .tgt-mark{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--text);border-radius:2px;opacity:.55}
  .brow .ctl{display:flex;align-items:center;gap:8px;justify-content:flex-end}
  .brow .verdict{font-size:11.5px;white-space:nowrap;font-weight:550}
  .over{color:var(--bad)} .under{color:var(--good)} .onpar{color:var(--text-faint)}

  /* inputs (>=16px so iOS never zooms) */
  input,select,textarea{font-family:var(--font);font-size:16px;color:var(--text);background:var(--glass-2);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid var(--glass-edge);border-radius:10px;
    padding:7px 11px;outline:none;width:100%;transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  input[type=number]{width:110px;text-align:right;font-variant-numeric:tabular-nums}
  input[type=checkbox]{width:auto;cursor:pointer;accent-color:var(--accent)}
  select{width:auto;cursor:pointer}
  .inline-edit{display:inline-flex;align-items:center;gap:6px}
  .inline-edit .pre{color:var(--text-faint)}

  /* privacy mask: cover inputs too */
  body.privacy input.money{-webkit-text-security:disc}
  @supports not (-webkit-text-security:disc){ body.privacy input.money:not(:focus){filter:blur(5px)} }

  /* tables */
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-faint);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--glass-edge);white-space:nowrap}
  td{padding:10px;border-bottom:1px solid var(--glass-edge);font-weight:450;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background .15s var(--ease)}
  tbody tr:hover{background:var(--accent-soft)}
  td.num{text-align:right;white-space:nowrap}
  td .pos{color:var(--good)}
  .rowdim td{opacity:.5}
  .strike td{text-decoration:line-through;opacity:.5}

  /* chips and badges */
  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:550;border:1px solid transparent;white-space:nowrap}
  .chip.ok{color:var(--good);background:color-mix(in srgb,var(--good) 16%,transparent);border-color:color-mix(in srgb,var(--good) 30%,transparent)}
  .chip.move{color:var(--warn);background:color-mix(in srgb,var(--warn) 16%,transparent);border-color:color-mix(in srgb,var(--warn) 30%,transparent)}
  .chip.dead{color:var(--text-faint);background:var(--chart-track)}
  .chip.keep{color:var(--text-dim);background:var(--chart-track)}
  .chipbtn{font-family:var(--font);display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:550;
    border:1px solid var(--glass-edge);background:var(--glass-2);color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:border-color .15s var(--ease)}
  .chipbtn:hover{border-color:var(--accent);color:var(--text)}
  .badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:650;text-transform:uppercase;letter-spacing:.04em;margin-left:5px;vertical-align:1px}
  .badge.transfer{color:var(--accent);background:var(--accent-soft)}
  .badge.plaid{color:var(--good);background:color-mix(in srgb,var(--good) 15%,transparent)}
  .badge.ocr{color:var(--warn);background:color-mix(in srgb,var(--warn) 15%,transparent)}
  .badge.flag{color:var(--warn);background:color-mix(in srgb,var(--warn) 15%,transparent)}
  .badge.dim{color:var(--text-faint);background:var(--chart-track)}
  .badge.reimb{color:var(--good);background:color-mix(in srgb,var(--good) 15%,transparent)}
  tr.sugrow td{background:color-mix(in srgb,var(--good) 7%,transparent)}
  .sugline{display:flex;gap:6px;align-items:center;margin-top:7px;font-size:13px;min-width:0}
  .sugline .minibtn{padding:3px 9px;font-size:11px;flex:none}
  .sugmain{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sugsub{color:var(--text-dim);font-size:12px;margin-left:6px}
  tr.candrow td{background:color-mix(in srgb,var(--warn) 6%,transparent)}
  .swatch{width:10px;height:10px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:7px;box-shadow:0 0 8px -1px currentColor}
  .dot{width:8px;height:8px;border-radius:99px;display:inline-block;flex:none}
  .lockbtn{background:none;border:none;cursor:pointer;color:var(--text-faint);padding:4px;border-radius:6px;display:inline-grid;place-items:center}
  .lockbtn:hover{color:var(--text)}
  .lockbtn[aria-pressed="true"]{color:var(--warn)}
  .lockbtn svg{width:14px;height:14px}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--text-dim);margin-top:14px;font-weight:450}
  .legend span{display:flex;align-items:center;gap:6px}
  .note{font-size:11.5px;color:var(--text-faint);margin-top:13px;line-height:1.6;font-weight:450}
  .note b{color:var(--text-dim);font-weight:550}
  .row-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  /* toolbar (transactions filters) */
  .toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input[type=search]{flex:1;min-width:180px;width:auto}
  .pager{display:flex;gap:9px;align-items:center;justify-content:flex-end;margin-top:13px;font-size:12.5px;color:var(--text-faint)}

  /* states */
  .empty{padding:34px 20px;text-align:center;color:var(--text-dim);font-size:13.5px}
  .empty .t{font-size:15px;font-weight:650;color:var(--text);margin-bottom:6px}
  .empty .h{color:var(--text-faint);max-width:52ch;margin:0 auto 14px}
  .skel{background:linear-gradient(90deg,var(--chart-track) 25%,color-mix(in srgb,var(--text) 9%,transparent) 50%,var(--chart-track) 75%);
    background-size:200% 100%;border-radius:9px}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;vertical-align:-2px}
  @media (prefers-reduced-motion: no-preference){ .spin{animation:spin .7s linear infinite} @keyframes spin{to{transform:rotate(360deg)}} }

  /* toast */
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--glass-2);
    -webkit-backdrop-filter:blur(18px) saturate(170%);backdrop-filter:blur(18px) saturate(170%);
    border:1px solid var(--glass-edge);color:var(--text);padding:12px 18px;border-radius:13px;font-size:13px;font-weight:500;
    box-shadow:var(--glass-shadow),inset 0 1px 0 var(--glass-hi);opacity:0;pointer-events:none;
    transition:opacity .25s var(--ease),transform .25s var(--ease);z-index:60;max-width:80vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* modal (OCR review) */
  .modal-overlay{position:fixed;inset:0;z-index:80;display:grid;place-items:center;background:rgba(2,4,10,.7);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);padding:20px}
  .modal{width:min(640px,94vw);max-height:84vh;overflow:auto;background:var(--glass-2);
    -webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-edge);border-radius:16px;padding:24px;box-shadow:var(--glass-shadow),inset 0 1px 0 var(--glass-hi)}
  .modal h2{font-size:17px;font-weight:700;margin:0 0 4px;letter-spacing:-0.02em}
  .modal .desc{font-size:13px;color:var(--text-dim);margin:0 0 16px}
  .modal .btnrow{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

  /* auth overlay */
  .auth-overlay{position:fixed;inset:0;z-index:100;display:none;place-items:center;background:rgba(2,4,10,.7);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .auth-overlay.show{display:grid}
  .auth-card{width:min(380px,90vw);background:var(--glass-2);-webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-edge);border-radius:18px;padding:30px;box-shadow:var(--glass-shadow),inset 0 1px 0 var(--glass-hi);text-align:center}
  .auth-card h2{font-weight:800;font-size:24px;margin:0 0 6px;letter-spacing:-0.05em}
  .auth-card p{color:var(--text-dim);font-size:13px;margin:0 0 20px}
  .auth-card input{margin-bottom:12px;text-align:center}
  .auth-card .btnrow{display:flex;gap:10px}
  .auth-card .btnrow button{flex:1;padding:11px;border-radius:11px;font-weight:600;font-size:13.5px;cursor:pointer;border:1px solid var(--glass-edge);background:var(--glass);color:var(--text)}
  .auth-card .btnrow button.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none}
  .auth-err{color:var(--bad);font-size:12px;min-height:16px;margin-top:10px}

  /* rewards router */
  .router-answer{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .router-card{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;border:1px solid var(--glass-edge);background:var(--glass-2)}
  .router-card.best{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--glass-2));box-shadow:0 0 18px -6px var(--glow)}
  .router-card .rc-name{font-weight:650;font-size:13.5px;flex:1}
  .router-card .rc-pct{font-weight:750;font-size:15px;font-variant-numeric:tabular-nums}
  .router-card.best .rc-pct{color:var(--accent)}
  .router-why{font-size:12.5px;color:var(--text-dim);margin-top:8px}

  /* net worth accounts */
  .acct-row{display:grid;grid-template-columns:minmax(150px,1fr) 150px 120px 100px 40px;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--glass-edge)}
  .acct-row:last-child{border-bottom:none}
  .acct-row .an{font-size:13.5px;font-weight:550;display:flex;align-items:center;gap:9px;min-width:0}
  .acct-row .an span.n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .acct-row .kind{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;display:block}
  .kicon{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:none;background:var(--accent-soft);color:var(--accent)}
  .kicon svg{width:14px;height:14px}

  @media(max-width:860px){
    .hero{grid-template-columns:1fr 1fr}
    .stat:first-child{grid-column:1 / -1}
    .grid2,.grid3{grid-template-columns:1fr}
    .bar-row{grid-template-columns:112px 1fr 78px}

<script>
'use strict';
/* ============================== helpers ============================== */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function safeUrl(u){ try{ const p=new URL(String(u)); if(p.protocol==='http:'||p.protocol==='https:') return p.href; }catch(e){} return ''; }
function fmtErr(j){ if(j&&typeof j.detail==='string') return j.detail; if(j&&j.error) return String(j.error); return ''; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(window.__tt); window.__tt=setTimeout(()=>{t.classList.remove('show');},3600); }
window.tallyToast=toast;
function debounce(fn,ms){ let t; return function(){ clearTimeout(t); const a=arguments,s=this; t=setTimeout(()=>fn.apply(s,a),ms); }; }
async function fetchJSON(url,opts){
  const r=await fetch(url,opts);
  if(r.status===401){
    // Session expired mid-use: surface the login overlay from ANY call site
    // (reads and writes alike) instead of quietly dropping the action.
    if(window.tallyShowAuth) window.tallyShowAuth();
    const e=new Error('login required'); e.auth=true; throw e;
  }
  let j=null; try{ j=await r.json(); }catch(e){}
  if(!r.ok){ const e=new Error(fmtErr(j)||('HTTP '+r.status)); e.status=r.status; e.body=j; throw e; }
  return j;
}
function jbody(b){ return {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}; }
function el(id){ return document.getElementById(id); }

let PRIVACY=(function(){ try{ return localStorage.getItem('tally-privacy')==='1'; }catch(e){ return false; } })();
const MASK='$·····';
const num=(n)=>{ n=Number(n); return isFinite(n)?n:0; };
const fmt=(n)=> PRIVACY?MASK:('$'+Math.round(num(n)).toLocaleString('en-US'));
const fmt2=(n)=> PRIVACY?MASK:('$'+num(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}));
function bigMoney(n){ if(PRIVACY) return MASK; const parts=num(n).toFixed(2).split('.'); return '$'+Number(parts[0]).toLocaleString('en-US')+'<span class="c">.'+parts[1]+'</span>'; }
const pctf=(bps)=> (num(bps)/100).toLocaleString('en-US',{maximumFractionDigits:2});

/* ============================== state ============================== */
let D=null, SUBS=[], ACCOUNTS=[], BUDGETS=[], INCOME=[], CARDS=[], SPLAN=null;
let NW=null, PLAID=null, KEYS=null, AUTHME=null;
const TX={rows:[],total:0,page:1,page_size:50,filters:{q:'',category:'',account_id:'',origin:''},loaded:false,loading:false,error:''};
let ACTIVE='overview';

const CATCOLOR={dining:'#fb7185',grocery:'#34d399',gas:'#fbbf24',apple_hardware:'#a78bfa',apple_services:'#a78bfa',
  shopping:'#818cf8',entertainment:'#22d3ee',subscriptions:'#c084fc',fitness:'#f472b6',transit:'#60a5fa',
  drugstore:'#94a3b8',streaming:'#c084fc',phone:'#38bdf8',travel:'#fb923c',other:'#71717a'};
const CARDCOLORS=['#b9bcc2','#3b82f6','#d4a017','#f0506e','#34d399','#a78bfa','#fb923c'];
function catColor(id){ return CATCOLOR[id]||'#7b8cff'; }
function catLabel(id){
  const c=(D&&D.categories||[]).find(x=>x.id===id); if(c) return c.label;
  return String(id||'').replace(/_/g,' ').replace(/\b\w/g,ch=>ch.toUpperCase());
}
function allCats(){
  const set=new Set();
  BUDGETS.forEach(b=>set.add(b.category));
  (D&&D.categories||[]).forEach(c=>set.add(c.id));
  CARDS.forEach(c=>Object.keys(c.rules||{}).forEach(k=>set.add(k)));
  return Array.from(set).sort((a,b)=>catLabel(a).localeCompare(catLabel(b)));
}
function cardByKey(k){ return CARDS.find(c=>c.key===k)||null; }
function cardName(k){ const c=cardByKey(k); if(c) return c.name; return String(k||'').replace(/_/g,' ').replace(/\b\w/g,ch=>ch.toUpperCase()); }
function cardColor(k){ const i=CARDS.findIndex(c=>c.key===k); return CARDCOLORS[(i>=0?i:5)%CARDCOLORS.length]; }
function recurCats(){ return (D&&D.categories||[]).filter(c=>c.id!=='apple_hardware'); }
function monthlyTotal(){ return recurCats().reduce((s,c)=>s+num(c.monthly),0); }

/* ============================== charts ============================== */
function svgTrend(values,labels,opts){
  opts=opts||{};
  if(!values||!values.length) return '<div class="empty">No monthly data yet.</div>';
  const w=opts.w||520,h=opts.h||150,pad=24,bw=(w-pad*2)/values.length;
  const max=Math.max.apply(null,values.map(num).concat([1]));
  let bars='',pts=[];
  values.forEach((v0,i)=>{
    const v=num(v0);
    const bh=(v/max)*(h-pad*2), x=pad+i*bw+bw*0.18, y=h-pad-bh, bwi=bw*0.64;
    const cur=opts.partialLast&&i===values.length-1;
    bars+='<rect x="'+x+'" y="'+y+'" width="'+bwi+'" height="'+Math.max(bh,0)+'" rx="2.5" fill="var(--accent)" opacity="'+(cur?'0.35':'0.85')+'"/>';
    pts.push([pad+i*bw+bw/2,y]);
    bars+='<text x="'+(pad+i*bw+bw/2)+'" y="'+(h-7)+'" font-size="9" fill="var(--text-faint)" text-anchor="middle">'+esc(labels[i]||'')+'</text>';
    bars+='<text x="'+(pad+i*bw+bw/2)+'" y="'+(y-5)+'" font-size="8.5" fill="var(--text-dim)" text-anchor="middle">'+(PRIVACY?'···':(Math.round(v/100)/10+'k'))+'</text>';
  });
  const line='M'+pts.map(p=>p.join(',')).join(' L');
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block" role="img" aria-label="'+esc(opts.label||'Monthly totals chart')+'">'+bars+
    '<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2"/>'+
    pts.map(p=>'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="var(--accent)"/>').join('')+'</svg>';
}
function svgDonut(segs,opts){
  opts=opts||{};
  const tot=segs.reduce((s,x)=>s+num(x.v),0);
  if(!segs.length||tot<=0) return '<div class="empty">Nothing to chart yet.</div>';
  const sz=opts.sz||170,cx=sz/2,cy=sz/2,r=sz/2-6,inner=r*0.62;
  let a=-Math.PI/2,paths='';
  segs.forEach(s=>{
    const ang=num(s.v)/tot*Math.PI*2, a2=a+Math.min(ang,Math.PI*2-0.0001);
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi2=cx+inner*Math.cos(a2),yi2=cy+inner*Math.sin(a2),xi1=cx+inner*Math.cos(a),yi1=cy+inner*Math.sin(a);
    const large=ang>Math.PI?1:0;
    paths+='<path d="M'+x1+','+y1+' A'+r+','+r+' 0 '+large+' 1 '+x2+','+y2+' L'+xi2+','+yi2+' A'+inner+','+inner+' 0 '+large+' 0 '+xi1+','+yi1+' Z" fill="'+s.c+'" stroke="var(--bg)" stroke-width="2"/>';
    a=a2;
  });
  return '<svg viewBox="0 0 '+sz+' '+sz+'" width="'+sz+'" height="'+sz+'" role="img" aria-label="'+esc(opts.label||'Spend mix donut chart')+'">'+paths+
    '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="15" font-weight="600" fill="var(--text)">'+fmt(tot)+'</text>'+
    '<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="9" fill="var(--text-faint)">/ mo</text></svg>';
}
function svgArea(series,opts){
  opts=opts||{};
  if(!series||!series.length) return '';
  const w=640,h=210,padL=54,padR=14,padT=16,padB=26;
  const vals=series.map(p=>num(p.total));
  let min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
  if(!isFinite(min)||!isFinite(max)){ min=0; max=1; }
  if(min===max){ min-=Math.max(1,Math.abs(min)*0.1); max+=Math.max(1,Math.abs(max)*0.1); }
  const span=max-min;
  const X=i=> series.length===1 ? (padL+(w-padL-padR)/2) : padL+(i/(series.length-1))*(w-padL-padR);
  const Y=v=> padT+(1-(num(v)-min)/span)*(h-padT-padB);
  const pts=series.map((p,i)=>[X(i),Y(p.total)]);
  const line='M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
  const area=line+' L'+pts[pts.length-1][0].toFixed(1)+','+(h-padB)+' L'+pts[0][0].toFixed(1)+','+(h-padB)+' Z';
  const yl=(v)=> PRIVACY?'···':('$'+Math.round(v).toLocaleString('en-US'));
  const mid=(min+max)/2;
  let grid='';
  [max,mid,min].forEach(v=>{
    grid+='<line x1="'+padL+'" y1="'+Y(v)+'" x2="'+(w-padR)+'" y2="'+Y(v)+'" stroke="var(--chart-track)" stroke-width="1"/>'+
      '<text x="'+(padL-7)+'" y="'+(Y(v)+3)+'" font-size="9" fill="var(--text-faint)" text-anchor="end">'+yl(v)+'</text>';
  });
  let xlab='';
  const first=series[0].date, last=series[series.length-1].date;
  xlab+='<text x="'+padL+'" y="'+(h-8)+'" font-size="9" fill="var(--text-faint)">'+esc(first)+'</text>';
  if(series.length>1) xlab+='<text x="'+(w-padR)+'" y="'+(h-8)+'" font-size="9" fill="var(--text-faint)" text-anchor="end">'+esc(last)+'</text>';
  const dots=series.length===1?'<circle cx="'+pts[0][0]+'" cy="'+pts[0][1]+'" r="4" fill="var(--accent)"/>':'';
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block" role="img" aria-label="'+esc(opts.label||'Net worth over time')+'">'+
    grid+'<path d="'+area+'" fill="var(--accent-soft)"/><path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2"/>'+dots+xlab+'</svg>';
}
function barRows(items,max){
  if(!items.length) return '<div class="empty">Nothing here yet.</div>';
  max=Math.max(num(max),1);
  return '<div class="bars">'+items.map(it=>{
    const pct=Math.max(2,(num(it.v)/max)*100);
    return '<div class="bar-row"><div class="nm">'+esc(it.nm)+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+it.c+'"></div></div>'+
      '<div class="amt">'+fmt(it.v)+'<span class="per">/mo</span></div></div>';
  }).join('')+'</div>';
}
function skelBlock(h){ return '<div class="skel" style="height:'+h+'px"></div>'; }
function errorPanel(msg,retryId){
  return '<div class="panel"><div class="empty"><div class="t">Could not load this view</div>'+
    '<div class="h">'+esc(msg||'The server did not respond.')+'</div>'+
    '<button class="btn" id="'+retryId+'">Retry</button></div></div>';
}

/* ============================== migration (localStorage -> server) ============================== */
async function migrateLocal(){
  let raw=null; try{ raw=localStorage.getItem('tally:v2'); }catch(e){ return; }
  if(!raw) return;
  let blob=null; try{ blob=JSON.parse(raw); }catch(e){}
  if(!blob||typeof blob!=='object'){
    try{ localStorage.setItem('tally:v2:migrated',raw); localStorage.removeItem('tally:v2'); }catch(e){}
    return;
  }
  try{
    const res=await fetchJSON('/api/migrate-local',jbody(blob));
    try{ localStorage.setItem('tally:v2:migrated',raw); localStorage.removeItem('tally:v2'); }catch(e){}
    const parts=[];
    if(res.budgets) parts.push(res.budgets+' budget targets');
    if(res.income) parts.push(res.income+' income sources');
    if(res.accounts_created||res.accounts_updated) parts.push((num(res.accounts_created)+num(res.accounts_updated))+' accounts');
    if(res.savings) parts.push('savings plan');
    toast(parts.length?('Moved your saved edits to the server: '+parts.join(', ')):'Local edits synced to the server');
  }catch(e){ /* leave the key; retried next load */ }
}

/* ============================== boot ============================== */
function showSkeletons(){
  el('hero').innerHTML='<div class="stat">'+skelBlock(64)+'</div><div class="stat">'+skelBlock(64)+'</div><div class="stat">'+skelBlock(64)+'</div><div class="stat">'+skelBlock(64)+'</div>';
  el('v-overview').innerHTML='<div class="panel">'+skelBlock(160)+'</div><div class="grid2"><div class="panel">'+skelBlock(180)+'</div><div class="panel">'+skelBlock(180)+'</div></div>';
}
function showLoadError(msg){
  el('periodSub').textContent='Backend unreachable';
  el('hero').innerHTML='';
  el('v-overview').innerHTML=errorPanel(msg||'Tally could not reach its backend. Check that the server is running, then retry.','retryBoot');
  const b=el('retryBoot'); if(b) b.addEventListener('click',boot);
}
async function loadCore(){
  const [ov,subs,accts,budgets,income,cards,splan]=await Promise.all([
    fetchJSON('/api/overview'), fetchJSON('/api/subscriptions'), fetchJSON('/api/accounts'),
    fetchJSON('/api/budgets'), fetchJSON('/api/income'), fetchJSON('/api/cards'), fetchJSON('/api/savings-plan'),
  ]);
  D=ov; SUBS=Array.isArray(subs)?subs:[]; ACCOUNTS=Array.isArray(accts)?accts:[];
  BUDGETS=Array.isArray(budgets)?budgets:[]; INCOME=Array.isArray(income)?income:[];
  CARDS=Array.isArray(cards)?cards:[]; SPLAN=splan||{monthly:0,goal:0,note:''};
}
let booted=false;
async function boot(){
  el('periodSub').textContent='Loading…';
  showSkeletons();
  if(!booted){ booted=true; await migrateLocal(); }
  try{
    await loadCore();
    renderShell();
  }catch(e){
    if(e&&e.auth){
      if(window.tallyShowAuth) window.tallyShowAuth();
      el('periodSub').textContent='Sign in to load your data';
      el('hero').innerHTML='';
      el('v-overview').innerHTML='';
    } else showLoadError(e&&e.message);
  }
}
function isFirstRun(){ return !!(D && num(D.spend.total6)===0 && ACCOUNTS.length===0); }
function renderShell(){
  el('periodSub').textContent=D.meta.period+' · updated '+D.meta.generated;
  const oh=el('ocrHint');
  if(num(D.meta.ocr_unreconciled)>0){ oh.hidden=false; oh.textContent=D.meta.ocr_unreconciled+' OCR row'+(D.meta.ocr_unreconciled===1?'':'s')+' unreconciled'; }
  else oh.hidden=true;
  if(isFirstRun()){
    el('appMain').hidden=true; el('firstRun').hidden=false;
    renderFirstRun();
    return;
  }
  el('appMain').hidden=false; el('firstRun').hidden=true;
  renderHero();
  show(ACTIVE,true);
}
async function reloadCore(){
  try{
    await loadCore();
    TX.loaded=false; NW=null;
    renderShell();
  }catch(e){ /* keep the last good render */ }
}

/* ============================== first run ============================== */
function renderFirstRun(){
  el('firstRun').innerHTML=
    '<div class="panel" style="max-width:560px;margin:8vh auto 0;text-align:center;padding:38px 34px">'+
    '<h2 style="font-size:22px">Welcome to Tally</h2>'+
    '<p class="desc" style="max-width:none">A local-first view of your money. Get your first transactions in and the dashboard builds itself.</p>'+
    '<div class="row-actions" style="justify-content:center;margin-top:8px">'+
    '<button class="btn primary" id="frUpload">Upload a statement</button>'+
    '<button class="btn" id="frConnect">Connect a bank</button>'+
    '<button class="btn" id="frDemo">Load demo data</button>'+
    '</div>'+
    '<div class="note">Statements stay on this machine. Demo data is clearly synthetic and loads only into an empty instance.</div>'+
    '</div>';
  el('frUpload').addEventListener('click',()=>el('uploadInput').click());
  el('frConnect').addEventListener('click',plaidConnect);
  el('frDemo').addEventListener('click',async ()=>{
    try{
      const j=await fetchJSON('/api/demo/load',{method:'POST'});
      toast('Demo data loaded: '+(j.transactions||0)+' transactions');
      reloadCore();
    }catch(e){ toast(e.status===409?'This instance already has data; demo load is blocked.':('Demo load failed: '+e.message)); }
  });
}

/* ============================== hero ============================== */
function renderHero(){
  if(!D) return;
  const incTot=INCOME.reduce((s,i)=>s+num(i.amount),0);
  const onHand=ACCOUNTS.filter(a=>a.kind!=='credit').reduce((s,a)=>s+num(a.balance),0);
  const rw=D.rewards||{};
  const nFull=num(D.meta.full_months_with_data);
  const rwCell=num(rw.gap_yr)>0.5
    ? '<div class="stat rw"><div class="lbl">Rewards left / yr</div><div class="val">'+bigMoney(rw.gap_yr)+'</div><div class="foot">vs optimal card routing</div></div>'
    : '<div class="stat rw"><div class="lbl">Rewards / yr</div><div class="val">'+bigMoney(rw.now_yr||0)+'</div><div class="foot">card routing is optimal</div></div>';
  el('hero').innerHTML=
    '<div class="stat out"><div class="lbl">Spending / mo</div><div class="val">'+bigMoney(D.spend.monthly_avg)+'</div><div class="foot">average over '+nFull+' full month'+(nFull===1?'':'s')+((D.meta.reimbursed_excluded&&D.meta.reimbursed_excluded.count)?' · '+fmt(D.meta.reimbursed_excluded.total)+' repaid excluded':'')+'</div></div>'+
    '<div class="stat in"><div class="lbl">Income / mo</div><div class="val">'+bigMoney(incTot)+'</div><div class="foot">'+(INCOME.length?INCOME.length+' source'+(INCOME.length===1?'':'s'):'add sources in Budget')+'</div></div>'+
    '<div class="stat net"><div class="lbl">On hand</div><div class="val">'+bigMoney(onHand)+'</div><div class="foot">'+ACCOUNTS.length+' account'+(ACCOUNTS.length===1?'':'s')+'</div></div>'+
    rwCell;
}

/* ============================== overview ============================== */
function renderOverview(){
  const v=el('v-overview');
  if(!D){ v.innerHTML=''; return; }
  const recur=recurCats();
  const top=recur.slice().sort((a,b)=>b.monthly-a.monthly).slice(0,6).map(c=>({nm:c.label,v:c.monthly,c:catColor(c.id)}));
  const maxC=Math.max.apply(null,top.map(t=>num(t.v)).concat([1]));
  const dv=D.delivery||{};
  const gm=D.gambling||{};
  const partial=D.meta.months.length>num(D.meta.full_months_with_data);
  let html='';

    '<div class="panel"><h2>Monthly spending</h2><p class="desc">Total per month over the current window'+(partial?'; the newest month is still filling in':'')+'.</p>'+
      svgTrend(D.spend.trend,D.meta.months,{partialLast:partial,label:'Monthly spending, '+D.meta.period})+'</div>'+
    '<div class="panel"><h2>Where it goes</h2><p class="desc">Top categories, monthly average.</p>'+barRows(top,maxC)+'</div>'+
    '</div>';

    cells.push('<div class="callout bad" style="margin:0"><div class="big">'+fmt(dv.monthly)+'</div><div class="txt"><b>Food delivery / mo.</b> '+
      dv.orders+' orders in this window, '+fmt2(dv.avg_order)+' average.</div></div>');

  v.innerHTML=html;
}

function matchCategory(text){
  const t=text.toLowerCase();
  const sub=SUBS.find(s=>s.name&&s.name.toLowerCase().includes(t));
  if(sub&&sub.category){ const cats=allCats(); if(cats.includes(sub.category)) return sub.category; }
  const byLabel=allCats().find(c=>catLabel(c).toLowerCase().includes(t)||c.replace(/_/g,' ').includes(t));
  return byLabel||null;
}
function renderRouterOut(merchant,nomatch){
  const out=el('routerOut'); if(!out) return;
  if(!ROUTER_CAT){
    out.innerHTML='<div class="note" style="margin-top:4px">'+(nomatch?'No match for “'+esc(merchant)+'” in your data; pick a category instead.':'Pick a category to get the answer.')+'</div>';
    return;
  }
  if(!CARDS.length){ out.innerHTML='<div class="note">No cards configured yet. Add them in <a href="#" data-go="settings">Settings</a>.</div>'; return; }
  const ranked=CARDS.map(c=>({c:c,bps:num((c.rules||{})[ROUTER_CAT])})).sort((a,b)=>b.bps-a.bps);
  const best=ranked[0], second=ranked[1];
  if(best.bps<=0){
    out.innerHTML='<div class="note">None of your cards earns rewards on '+esc(catLabel(ROUTER_CAT))+' yet. Set rules in <a href="#" data-go="settings">Settings</a>.</div>';
    return;
  }
  out.innerHTML=ranked.map((r,i)=>
    '<div class="router-card'+(i===0?' best':'')+'">'+
      '<span class="dot" style="background:'+cardColor(r.c.key)+'"></span>'+
      '<span class="rc-name">'+esc(r.c.name)+(i===0?' <span class="badge plaid" style="margin-left:8px">use this</span>':'')+'</span>'+
      '<span class="rc-pct">'+pctf(r.bps)+'%</span>'+
    '</div>').join('')+
    '<div class="router-why">'+esc(catLabel(ROUTER_CAT))+(merchant?(' (matched from “'+esc(merchant)+'”)'):'')+': '+
    esc(best.c.name)+' earns '+pctf(best.bps)+'%'+
    (second&&second.bps<best.bps?(' vs '+pctf(second.bps)+'% on '+esc(second.c.name)):(second?(', tied with '+esc(second.c.name)):''))+'.</div>';
}

function txQuery(){
  const p=new URLSearchParams();
  if(TX.filters.q) p.set('q',TX.filters.q);
  if(TX.filters.category) p.set('category',TX.filters.category);
  if(TX.filters.account_id) p.set('account_id',TX.filters.account_id);
  if(TX.filters.origin) p.set('origin',TX.filters.origin);
  return p;
}
async function loadTx(){
  loadReimbSuggestions();
  TX.loading=true; TX.error='';
  const body=el('txBody'); if(body&&!TX.loaded) body.innerHTML=skelBlock(46)+'<div style="height:8px"></div>'+skelBlock(320);
  const p=txQuery(); p.set('page',TX.page); p.set('page_size',TX.page_size);
  try{
    const j=await fetchJSON('/api/transactions?'+p.toString());
    TX.rows=j.rows||[]; TX.total=num(j.total); TX.page=num(j.page)||1; TX.loaded=true;
  }catch(e){
    if(e&&e.auth){ if(window.tallyShowAuth) window.tallyShowAuth(); return; }
    TX.error=e.message||'Load failed';
  }
  TX.loading=false;
  renderTxBody();
}

        '<td><button class="lockbtn" data-lock="'+esc(t.uid)+'" aria-pressed="'+(t.user_locked?'true':'false')+'" '+

          'aria-label="Mark repayment status for '+esc(t.merchant||'transaction')+'" '+
          'title="'+(t.reimbursement?'Marked as paid back; click to change':'Mark as paid back (group front / someone else\u2019s)')+'"'+

function txBodyClick(e){

const REIMB_OPTS=[
  ['','Counts as my spending'],
  ['group|1','Group front \u00b7 always this merchant'],
  ['thirdparty|1','Someone else\u2019s \u00b7 always this merchant'],
  ['group|0','Group front \u00b7 this charge only'],
  ['thirdparty|0','Someone else\u2019s \u00b7 this charge only'],
];
function openReimbEditor(btn){
  const uid=btn.getAttribute('data-reimb');
  const row=TX.rows.find(r=>r.uid===uid); if(!row) return;

async function setReimb(uid,kind,always){
  const body=kind?{reimbursement:kind,apply_to_merchant:!!always}:{clear_reimbursement:true,apply_to_merchant:true};
  try{
    const j=await fetchJSON('/api/transactions/'+encodeURIComponent(uid),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const n=num(j.updated_others);
    toast(kind==='mine'?'Kept as your spending \u00b7 will not ask again':(kind?('Excluded from your spending'+(always?(n>0?' \u00b7 rule saved, '+n+' more charge'+(n===1?'':'s')+' covered':' \u00b7 rule saved for this merchant'):'')):'Counted as your spending again'));
    TXSUG.stale=true;
    await Promise.all([loadTx(),reloadCore()]);
    if(typeof loadReimbRules==='function') loadReimbRules.stale=true;
  }catch(e){ toast('Could not update: '+e.message); loadTx(); }
}
/* Repayment suggestions: charges followed by inflows adding back to the
   exact amount. Loaded once per session, refreshed after any marking. */
const TXSUG={exact:[],candidates:[],big:[],loaded:false,stale:false,hidden:{}};
function sugClass(uid){
  if(TXSUG.hidden[uid]) return '';
  if(TXSUG.exact.some(s=>s.uid===uid)) return ' class="sugrow"';
  if(TXSUG.candidates.some(s=>s.uid===uid)||TXSUG.big.some(s=>s.uid===uid)) return ' class="candrow"';
  return '';
}
async function loadReimbSuggestions(){
  if(TXSUG.loaded&&!TXSUG.stale) return;
  try{
    const j=await fetchJSON('/api/reimbursements/suggestions');
    TXSUG.exact=j.exact||[]; TXSUG.candidates=j.candidates||[]; TXSUG.big=j.big||[];
  }catch(e){ TXSUG.exact=[]; TXSUG.candidates=[]; TXSUG.big=[]; }
  TXSUG.loaded=true; TXSUG.stale=false;
  renderReimbBanner();
  renderTxBody();
}
function shortName(s,n){ s=String(s||''); return s.length>n?(s.slice(0,n-1)+'…'):s; }
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function humanDate(iso){ const p=String(iso).split('-'); return MON[(+p[1]||1)-1]+' '+(+p[2]||''); }
function daysAfter(a,b){ const d=Math.round((new Date(b)-new Date(a))/86400000);
  if(d===0) return 'the same day';
  if(d<0) return d===-1?'the day before':((-d)+' days before');
  return d===1?'the next day':(d+' days later'); }
function legPhrase(s,l){
  const m=String(l.merchant||'');
  const z=m.match(/zelle\s+from\s+([a-z]+)/i);
  const who=z?(z[1][0].toUpperCase()+z[1].slice(1).toLowerCase()+' sent you'):
    (/venmo/i.test(m)?'a Venmo brought back':'you got back');
  return who+' '+fmt2(l.amount)+' '+daysAfter(s.date,l.date);
}
function sugRow(s){
  const legs=s.repaid_by.map(l=>legPhrase(s,l)).join(', and ');
  const full=num(s.coverage)>=0.99;
  return '<div class="sugline">'+
    '<span class="sugmain" title="'+esc(s.description||s.merchant)+'">'+
      '<b>'+esc(shortName(s.merchant,24))+'</b> · '+fmt2(s.amount)+' on '+esc(humanDate(s.date))+
      '<span class="sugsub">'+esc(legs)+(full?'':' · covers part of it')+'</span></span>'+
    '<button class="minibtn" data-sug-yes="'+esc(s.uid)+'" data-full="'+(full?'1':'0')+'">Yes, exclude it</button>'+
    '<button class="minibtn" data-sug-skip="'+esc(s.uid)+'" title="No, this was my spending">No</button></div>';
}
function renderReimbBanner(){
  const host=el('txSuggest'); if(!host) return;
  const items=TXSUG.exact.concat(TXSUG.candidates).filter(s=>!TXSUG.hidden[s.uid]);
  if(!items.length){ host.innerHTML=''; return; }
  const shown=items.slice(0,6);
  host.innerHTML='<div class="callout info" role="region" aria-label="Repayment review" style="display:block">'+
    '<b>Did someone pay you back for these?</b>'+
    '<div class="sugsub" style="margin-left:0;margin-top:2px">Money came in shortly after each of these charges. Saying yes takes the charge out of your spending numbers; the transaction itself stays.</div>'+
    shown.map(sugRow).join('')+
    (items.length>6?'<div class="sugsub" style="margin-top:6px;margin-left:0">'+(items.length-6)+' more — green and amber rows in the table below</div>':'')+
    '</div>';
  host.querySelectorAll('[data-sug-yes]').forEach(b=>b.addEventListener('click',()=>{
    // Fully repaid reads as someone else's purchase, partial as a group
    // front; just a label, the math is identical. One-time by design:
    // standing rules come from the row menu, so splitting one Amazon order
    // never silently excludes future Amazon purchases.
    setReimb(b.getAttribute('data-sug-yes'), b.getAttribute('data-full')==='1'?'thirdparty':'group', false);
  }));
  host.querySelectorAll('[data-sug-skip]').forEach(b=>b.addEventListener('click',()=>{ TXSUG.hidden[b.getAttribute('data-sug-skip')]=1; renderReimbBanner(); renderTxBody(); }));
}
function openCatEditor(btn){
  const uid=btn.getAttribute('data-editcat');

}
async function toggleLock(uid){
  const row=TX.rows.find(r=>r.uid===uid); if(!row) return;

const TARGETS={};
function budgetCats(){
  const map={};
  BUDGETS.forEach(b=>{ map[b.category]={id:b.category,target:num(b.target),monthly:0}; });
  recurCats().forEach(c=>{
    if(!map[c.id]) map[c.id]={id:c.id,target:num(c.target),monthly:num(c.monthly)};
    else map[c.id].monthly=num(c.monthly);
  });
  delete map.apple_hardware;
  return Object.values(map).sort((a,b)=>b.monthly-a.monthly);
}
const saveBudgets=debounce(async function(){
  try{
    await fetchJSON('/api/budgets',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({targets:TARGETS})});
    toast('Budget targets saved');
  }catch(e){ toast('Could not save budgets: '+e.message); }
},700);
function renderBudget(){
  const v=el('v-budget');
  if(!D){ v.innerHTML=''; return; }
  const cats=budgetCats();
  Object.keys(TARGETS).forEach(k=>delete TARGETS[k]);
  cats.forEach(c=>{ TARGETS[c.id]=c.target; });
  v.innerHTML=
    '<div id="bud-summary"></div>'+
    '<div class="panel"><h2>Targets vs actual</h2><p class="desc">Bar shows actual monthly spend; the marker is your target. Edits save automatically.</p>'+
      '<div id="bud-rows">'+cats.map(budgetRow).join('')+'</div>'+
      '<div class="legend"><span><span class="swatch" style="background:var(--bad)"></span>over target</span><span><span class="swatch" style="background:var(--good)"></span>under target</span><span>| target marker</span></div>'+

    '</div>'+
    '<div id="bud-options"></div>';
  renderBudgetSummary();
  renderIncomeSection();
  renderSavingsSection();
  renderSavingsOptions();
  el('bud-rows').addEventListener('change',e=>{
    const inp=e.target.closest('[data-tgt]'); if(!inp) return;
    const id=inp.getAttribute('data-tgt');
    TARGETS[id]=Math.max(0,num(inp.value));
    const c=budgetCats().find(x=>x.id===id);
    if(c){ c.target=TARGETS[id]; const holder=el('brow-'+id); if(holder) holder.outerHTML=budgetRow(c); }
    const b=BUDGETS.find(x=>x.category===id); if(b) b.target=TARGETS[id];
    renderBudgetSummary();
    saveBudgets();
  });
}
function budgetRow(c){
  const tgt=TARGETS[c.id]!=null?TARGETS[c.id]:c.target, act=c.monthly;
  const max=Math.max(act,tgt,1)*1.12;
  const diff=act-tgt, pctT=(tgt/max)*100, pctA=(act/max)*100;
  const over=diff>5, under=diff<-5;
  const col=over?'var(--bad)':(under?'var(--good)':'var(--text-faint)');
  const verdict=over?('<span class="over">'+fmt(diff)+' over</span>')
    :under?('<span class="under">'+fmt(-diff)+' under</span>')
    :'<span class="onpar">on target</span>';
  return '<div class="brow" id="brow-'+esc(c.id)+'">'+
    '<div class="nm">'+esc(catLabel(c.id))+'<span class="subnm">actual '+fmt(act)+'/mo</span></div>'+
    '<div class="tgt-track"><div class="tgt-fill" style="width:'+pctA+'%;background:color-mix(in srgb,'+col+' 26%,transparent);border-right:2px solid '+col+'"></div><div class="tgt-mark" style="left:'+pctT+'%"></div></div>'+
    '<div class="ctl"><span class="verdict">'+verdict+'</span><span class="inline-edit"><span class="pre">$</span>'+
      '<input class="money" type="number" data-tgt="'+esc(c.id)+'" value="'+tgt+'" min="0" step="5" aria-label="Monthly target for '+esc(catLabel(c.id))+'"></span></div>'+
    '</div>';
}
function renderBudgetSummary(){
  const cats=budgetCats();
  let actual=0,target=0;
  cats.forEach(c=>{ actual+=c.monthly; target+=(TARGETS[c.id]!=null?TARGETS[c.id]:c.target); });
  const net=actual-target;
  el('bud-summary').innerHTML=
    '<div class="callout '+(net>5?'bad':'good')+'"><div class="big">'+(net>0?'+':'')+fmt(net)+'/mo</div>'+
    '<div class="txt">'+(net>5
      ? 'Spending runs <b>'+fmt(net)+'/mo over</b> the combined targets ('+fmt(net*12)+'/yr). The rows below show where.'
      : 'Spending is at or under the combined targets.')+
    '<br><span style="color:var(--text-faint)">Actual '+fmt(actual)+'/mo · target '+fmt(target)+'/mo</span></div></div>';
}

/* ============================== subscriptions ============================== */
const SUB_STATUSES=['keep','move','review','verify','discretionary','canceled'];
function renderSubs(){
  const v=el('v-subs');
  const active=SUBS.filter(s=>s.status!=='canceled');
  const dead=SUBS.filter(s=>s.status==='canceled');
  const activeTot=active.reduce((s,x)=>s+num(x.monthly),0);
  const deadTot=dead.reduce((s,x)=>s+num(x.monthly),0);
  const needsMove=s=> s.status!=='canceled' && s.recommended_card && s.current_card && s.current_card!==s.recommended_card;
  const moveList=active.filter(needsMove);
  const doneCount=moveList.filter(s=>s.moved).length;
  const flagged=SUBS.filter(s=>s.flag).length;
  const row=(s)=>{
    const isDead=s.status==='canceled';
    const move=needsMove(s);
    const chip=isDead?'<span class="chip dead">canceled</span>'
      : move?(s.moved?'<span class="chip ok">moved</span>':'<span class="chip move">→ '+esc(cardName(s.recommended_card))+'</span>')
      : '<span class="chip keep">optimal</span>';
    const flag=s.flag==='price_creep'?'<span class="badge flag">price creep</span>'
      : s.flag==='forgotten'?'<span class="badge dim">forgotten?</span>':'';
    const mUrl=safeUrl(s.manage_url);
    return '<tr class="'+(isDead?'strike':'')+'" data-subid="'+s.id+'">'+
      '<td><b style="font-weight:600">'+esc(s.name)+'</b>'+flag+'</td>'+
      '<td class="num">'+fmt2(s.monthly)+'</td>'+
      '<td style="color:var(--text-dim)">'+esc(catLabel(s.category||'other'))+'</td>'+
      '<td><span class="swatch" style="background:'+cardColor(s.current_card)+'"></span>'+esc(cardName(s.current_card))+'</td>'+
      '<td>'+chip+'</td>'+
      '<td><select data-substatus="'+s.id+'" aria-label="Status for '+esc(s.name)+'">'+
        SUB_STATUSES.map(st=>'<option value="'+st+'"'+(st===s.status?' selected':'')+'>'+st+'</option>').join('')+'</select></td>'+
      '<td style="text-align:center">'+(move||s.moved?('<input type="checkbox" data-submoved="'+s.id+'" '+(s.moved?'checked':'')+' aria-label="Billing moved for '+esc(s.name)+'">'):'·')+'</td>'+
      '<td>'+(mUrl?('<a href="'+esc(mUrl)+'" target="_blank" rel="noopener noreferrer">manage ↗</a>'):'·')+'</td>'+
      '<td><button class="minibtn del" data-subdel="'+s.id+'" aria-label="Delete '+esc(s.name)+'">×</button></td>'+
    '</tr>';
  };
  v.innerHTML=
    '<div class="grid3">'+
      '<div class="callout info" style="margin:0"><div class="big">'+fmt(activeTot)+'</div><div class="txt"><b>Active subs / mo</b> · '+fmt(activeTot*12)+'/yr across '+active.length+'</div></div>'+
      '<div class="callout good" style="margin:0"><div class="big">'+fmt(deadTot)+'</div><div class="txt"><b>Canceled / mo</b> · '+fmt(deadTot*12)+'/yr back across '+dead.length+'</div></div>'+
      '<div class="callout" style="margin:0"><div class="big">'+doneCount+'/'+moveList.length+'</div><div class="txt"><b>Card moves done</b>'+(flagged?(' · '+flagged+' flagged'):'')+'</div></div>'+
    '</div>'+
    '<div class="panel"><div class="row-actions" style="justify-content:space-between">'+
      '<div><h2 style="display:inline">Subscriptions</h2><p class="desc" style="margin:4px 0 0">Detected from recurring charges plus anything you add. Move billing to the best card, then tick it off.</p></div>'+
      '<button class="btn" id="subDetect">Detect now</button></div>'+
      (active.length?
      '<div class="tablewrap" style="margin-top:14px"><table><thead><tr><th>Name</th><th style="text-align:right">$/mo</th><th>Category</th><th>On card</th><th>Best card</th><th>Status</th><th>Moved</th><th></th><th aria-label="Delete"></th></tr></thead><tbody>'+
      active.sort((a,b)=>b.monthly-a.monthly).map(row).join('')+'</tbody></table></div>'
      :'<div class="empty"><div class="t">No subscriptions yet</div><div class="h">Run Detect now to scan your transactions for recurring charges.</div></div>')+
    '</div>'+
    (dead.length?('<div class="panel"><h2>Canceled</h2><p class="desc">No longer charging. Money already reclaimed.</p>'+
      '<div class="tablewrap"><table><tbody>'+dead.sort((a,b)=>b.monthly-a.monthly).map(row).join('')+'</tbody></table></div></div>'):'');
  el('subDetect').addEventListener('click',detectSubs);
  v.querySelectorAll('[data-substatus]').forEach(sel=>sel.addEventListener('change',async e=>{
    const id=e.target.getAttribute('data-substatus');
    try{
      const j=await fetchJSON('/api/subscriptions/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:e.target.value})});
      const i=SUBS.findIndex(x=>String(x.id)===id); if(i>=0) SUBS[i]=Object.assign(SUBS[i],j);
      renderSubs(); toast('Status updated');
    }catch(err){ toast('Could not update: '+err.message); renderSubs(); }
  }));
  v.querySelectorAll('[data-submoved]').forEach(cb=>cb.addEventListener('change',async e=>{
    const id=e.target.getAttribute('data-submoved');
    try{
      const j=await fetchJSON('/api/subscriptions/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({moved:e.target.checked})});
      const i=SUBS.findIndex(x=>String(x.id)===id); if(i>=0) SUBS[i]=Object.assign(SUBS[i],j);
      renderSubs();
    }catch(err){ toast('Could not save: '+err.message); renderSubs(); }
  }));
  v.querySelectorAll('[data-subdel]').forEach(b=>b.addEventListener('click',async e=>{
    const id=e.currentTarget.getAttribute('data-subdel');
    const s=SUBS.find(x=>String(x.id)===id);
    if(!confirm('Delete "'+(s?s.name:'this subscription')+'"? Use this for false detections; it does not cancel the real service.')) return;
    try{
      await fetchJSON('/api/subscriptions/'+id,{method:'DELETE'});
      SUBS=SUBS.filter(x=>String(x.id)!==id);
      renderSubs(); toast('Deleted');
    }catch(err){ toast('Could not delete: '+err.message); }
  }));
}
async function detectSubs(){
  const b=el('subDetect'); if(b){ b.disabled=true; b.innerHTML='<span class="spin"></span> Detecting…'; }
  try{
    const j=await fetchJSON('/api/subscriptions/detect',{method:'POST'});
    toast('Detected '+num(j.detected)+' new · updated '+num(j.updated)+' · '+num(j.flagged_creep)+' price creep · '+num(j.flagged_forgotten)+' forgotten');
    SUBS=await fetchJSON('/api/subscriptions');
    renderSubs();
  }catch(e){ toast('Detection failed: '+e.message); if(b){ b.disabled=false; b.textContent='Detect now'; } }
}

function renderCardsEditor(){
  const host=el('setCards'); if(!host) return;
  if(!CARDS.length){
    host.innerHTML='<div class="empty"><div class="t">No cards yet</div><div class="h">Add your first card to start routing rewards.</div></div>'+cardAddForm();
    bindCardAdd(host); return;
  }

    '<div class="tablewrap"><table><thead><tr><th>Category</th>'+
    CARDS.map(c=>'<th><input data-cardname="'+esc(c.key)+'" value="'+esc(c.name)+'" style="min-width:120px;font-size:16px" aria-label="Name for card '+esc(c.key)+'">'+

    '</tr></thead><tbody>'+
    cats.map(cat=>'<tr><td style="white-space:nowrap"><span class="dot" style="background:'+catColor(cat)+';margin-right:8px"></span>'+esc(catLabel(cat))+'</td>'+
      CARDS.map(c=>'<td class="num"><span class="inline-edit"><input type="number" data-rule="'+esc(c.key)+':'+esc(cat)+'" value="'+pctf(num((c.rules||{})[cat]))+'" step="0.25" min="0" style="width:74px" aria-label="'+esc(c.name)+' percent back on '+esc(catLabel(cat))+'"><span class="pre">%</span></span></td>').join('')+
    '</tr>').join('')+
    '</tbody></table></div>'+cardAddForm();
  const dirty={};
  const flush=debounce(async function(){
    const keys=Object.keys(dirty);
    for(const k of keys){
      delete dirty[k];
      const card=cardByKey(k); if(!card) continue;
      try{ await fetchJSON('/api/cards/'+encodeURIComponent(k),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:card.name,rules:card.rules})}); }
      catch(e){ toast('Could not save '+card.name+': '+e.message); }
    }
    if(keys.length) toast('Card rules saved');
  },800);
  host.querySelectorAll('[data-rule]').forEach(inp=>inp.addEventListener('change',e=>{
    const parts=e.target.getAttribute('data-rule').split(':');
    const card=cardByKey(parts[0]); if(!card) return;
    card.rules=card.rules||{};
    card.rules[parts[1]]=Math.max(0,Math.round(num(e.target.value)*100));
    dirty[parts[0]]=1; flush();
  }));
  host.querySelectorAll('[data-cardname]').forEach(inp=>inp.addEventListener('change',e=>{
    const card=cardByKey(e.target.getAttribute('data-cardname')); if(!card) return;
    card.name=e.target.value.trim()||card.name;
    dirty[card.key]=1; flush();
  }));
  host.querySelectorAll('[data-carddel]').forEach(b=>b.addEventListener('click',async e=>{
    const key=e.currentTarget.getAttribute('data-carddel');
    const card=cardByKey(key);
    if(!confirm('Delete card "'+(card?card.name:key)+'" and its reward rules?')) return;
    try{ await fetchJSON('/api/cards/'+encodeURIComponent(key),{method:'DELETE'});
      CARDS=CARDS.filter(c=>c.key!==key); renderCardsEditor(); toast('Card deleted'); }
    catch(err){ toast('Could not delete: '+err.message); }
  }));
  bindCardAdd(host);
}

/* Plaid Link script loads only on demand, never at page load. */
function ensurePlaid(cb){
  if(window.Plaid){ cb(); return; }
  let s=document.getElementById('plaidScript');
  if(s){ s.addEventListener('load',cb,{once:true}); return; }
  s=document.createElement('script');
  s.id='plaidScript';
  s.src='https://cdn.plaid.com/link/v2/stable/link-initialize.js';
  s.onload=cb;
  s.onerror=function(){
    s.remove(); // a dead node would make every later click a silent no-op
    toast('Plaid Link could not load; check your connection.');
  };
  document.head.appendChild(s);
}
function openPlaidLink(token,recv){
  ensurePlaid(function(){
    const cfg={ token:token,
      onSuccess:function(public_token,meta){
        const inst=(meta&&meta.institution&&meta.institution.name)||'your bank';
        toast('Linked '+inst+', finishing…');
        fetchJSON('/api/plaid/exchange',jbody({public_token:public_token}))
          .then(function(){ return fetchJSON('/api/plaid/sync',{method:'POST'}); })
          .then(function(s){ toast('Bank connected. '+num(s.synced)+' new transactions.'); PLAID=null; loadPlaid(); reloadCore(); })
          .catch(function(){ toast('Linked. Sync will run shortly.'); PLAID=null; loadPlaid(); });
        try{ sessionStorage.removeItem('tally_lt'); }catch(e){}
      },
      onExit:function(err){ if(err) toast('Bank connect closed.'); try{ sessionStorage.removeItem('tally_lt'); }catch(e){} }
    };
    if(recv) cfg.receivedRedirectUri=recv;
    window.Plaid.create(cfg).open();
  });
}
function plaidConnect(){
  toast('Opening secure bank connect…');
  fetchJSON('/api/plaid/link-token',jbody({})).then(function(j){
    if(!(j&&j.configured&&j.link_token)){ toast('Plaid is not configured on this instance.'); return; }
    try{ sessionStorage.setItem('tally_lt',j.link_token); }catch(e){}
    openPlaidLink(j.link_token,null);
  }).catch(function(e){ toast('Could not start bank connect: '+e.message); });
}
function plaidFix(itemId){
  toast('Opening relink…');
  fetchJSON('/api/plaid/link-token',jbody({item_id:itemId})).then(function(j){
    if(!(j&&j.link_token)){ toast('Could not start relink.'); return; }
    try{ sessionStorage.setItem('tally_lt',j.link_token); }catch(e){}
    openPlaidLink(j.link_token,null);
  }).catch(function(e){ toast('Could not start relink: '+e.message); });
}

const RENDERERS={overview:renderOverview,spending:renderSpending,transactions:renderTransactions,
  budget:renderBudget,subs:renderSubs,networth:renderNetworth,settings:renderSettings};
function show(v,force){
  if(!RENDERERS[v]) v='overview';
  ACTIVE=v;
  document.querySelectorAll('#tabs .tab').forEach(t=>{
    const sel=t.dataset.v===v;
    t.setAttribute('aria-selected',sel?'true':'false');
    t.tabIndex=sel?0:-1;
  });
  document.querySelectorAll('.view').forEach(p=>p.classList.toggle('active',p.id==='v-'+v));
  if(!D&&!force) return;
  if(D) RENDERERS[v]();
}
el('tabs').addEventListener('click',e=>{ const t=e.target.closest('.tab'); if(t) show(t.dataset.v); });
el('tabs').addEventListener('keydown',e=>{
  const tabs=Array.from(document.querySelectorAll('#tabs .tab'));
  const i=tabs.indexOf(document.activeElement);
  if(i<0) return;
  let j=null;
  if(e.key==='ArrowRight') j=(i+1)%tabs.length;
  else if(e.key==='ArrowLeft') j=(i-1+tabs.length)%tabs.length;
  else if(e.key==='Home') j=0;
  else if(e.key==='End') j=tabs.length-1;
  if(j!=null){ e.preventDefault(); tabs[j].focus(); show(tabs[j].dataset.v); }
});

})();

/* ============================== SSE live refresh ============================== */
(function(){
  try{
    const es=new EventSource('/api/events');
    const refresh=debounce(function(){ if(D) reloadCore(); else boot(); },600);
    es.addEventListener('transactions:updated',refresh);
  }catch(e){}
})();

/* ============================== Plaid OAuth resume ============================== */
(function(){
  if(/oauth_state_id=/.test(window.location.search||'')){
    let lt=null; try{ lt=sessionStorage.getItem('tally_lt'); }catch(e){}
    if(lt) openPlaidLink(lt,window.location.href);
  } else {
    try{ sessionStorage.removeItem('tally_lt'); }catch(e){}
  }
})();

boot();
</script>

<script>
/* auth: passkey login/register overlay. Never crashes the app when logged out. */
(function(){
  function b2b(s){s=(s||'').replace(/-/g,'+').replace(/_/g,'/');var p='='.repeat((4-s.length%4)%4);var b=atob(s+p);var u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u.buffer;}
  function u2b(buf){var u=new Uint8Array(buf),s='';for(var i=0;i<u.length;i++)s+=String.fromCharCode(u[i]);return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
  function J(u,b){return fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}).then(function(r){return r.json();});}
  var ov=document.getElementById('authOverlay'), err=document.getElementById('authErr');
  var regSec=document.getElementById('authRegSection'), regToggle=document.getElementById('authRegToggle');
  function showErr(m){if(err)err.textContent=m||'';}
  function revealReg(){ if(regSec)regSec.style.display=''; if(regToggle)regToggle.style.display='none'; }
  function showOverlay(){ if(ov)ov.classList.add('show'); }
  window.tallyShowAuth=showOverlay;
  async function register(){
    var code=(document.getElementById('authSetupCode').value||'').trim();
    var label=(document.getElementById('authLabel').value||'').trim();
    if(!code){ revealReg(); showErr('Enter your setup code.'); return; }
    var r=await fetch('/api/auth/register/begin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({setup_code:code,handle:'owner',label:label})});
    if(!r.ok){ var j=null; try{j=await r.json();}catch(e){} showErr((j&&typeof j.detail==='string')?j.detail:'Could not start registration.'); return; }
    var o=await r.json();
    o.challenge=b2b(o.challenge); o.user.id=b2b(o.user.id);
    (o.excludeCredentials||[]).forEach(function(c){c.id=b2b(c.id);});
    var c=await navigator.credentials.create({publicKey:o});
    var cred={id:c.id,rawId:u2b(c.rawId),type:c.type,
      response:{attestationObject:u2b(c.response.attestationObject),clientDataJSON:u2b(c.response.clientDataJSON)},
      clientExtensionResults:c.getClientExtensionResults?c.getClientExtensionResults():{}};
    var fin=await J('/api/auth/register/finish',{credential:cred,label:label});
    if(fin.ok)location.reload();else showErr('Could not create passkey.');
  }
  async function login(){
    var r=await fetch('/api/auth/login/begin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
    if(r.status===404){ showErr('No passkey is registered for this host yet.'); revealReg(); return; }
    if(!r.ok){ showErr('Sign in failed.'); return; }
    var o=await r.json();
    o.challenge=b2b(o.challenge); (o.allowCredentials||[]).forEach(function(c){c.id=b2b(c.id);});
    var c=await navigator.credentials.get({publicKey:o});
    var fin=await J('/api/auth/login/finish',{id:c.id,rawId:u2b(c.rawId),type:c.type,
      response:{authenticatorData:u2b(c.response.authenticatorData),clientDataJSON:u2b(c.response.clientDataJSON),signature:u2b(c.response.signature),userHandle:c.response.userHandle?u2b(c.response.userHandle):null},
      clientExtensionResults:c.getClientExtensionResults?c.getClientExtensionResults():{}});
    if(fin.ok)location.reload();else showErr('Sign in failed.');
  }
  var lb=document.getElementById('authLogin');
  if(lb)lb.addEventListener('click',function(){showErr('');login().catch(function(){showErr('Sign in failed.');});});
  var rb=document.getElementById('authRegister');
  if(rb)rb.addEventListener('click',function(){showErr('');register().catch(function(){showErr('Could not create passkey.');});});
  if(regToggle)regToggle.addEventListener('click',function(e){e.preventDefault();revealReg();});
  var lo=document.getElementById('logoutBtn');
  if(lo)lo.addEventListener('click',function(){fetch('/api/auth/logout',{method:'POST'}).then(function(){location.reload();}).catch(function(){location.reload();});});
  fetch('/api/auth/me').then(function(r){return r.json();}).then(function(m){
    if(m.authEnabled && location.hostname==='127.0.0.1'){ location.hostname='localhost'; return; } // passkeys never work on an IP origin
    if(m.authEnabled && m.authenticated && lo) lo.hidden=false;
    if(m.authEnabled && !m.authenticated){ if(m.anyCredentials===false) revealReg(); showOverlay(); }
  }).catch(function(){});
})();
</script>
</body>
</html>
